<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5 podemos inserir os elementos da lista a seguir, Passe o mouse sobre os termos para edscobrir qual tag deverá usar em cada caso.</p>
    <ul type="square">
        <li><abbr title="tag <p>">Parágrafos</abbr></li>
        <li><abbr title="tags de <h1> a <h6>">Títulos</abbr></li>
        <li><abbr title="tag <img>">Imagens</abbr></li>
        <li><abbr title="tag <abbr>">Abreviações</abbr></li>
        <li><abbr title="tag <code>">Códigos-fonte</abbr></li>
        <li><abbr title="tag <ol> e <li>">Listas numeradas</abbr></li>
        <li><abbr title="tag <ul> e <li>">Listas com demarcadores</abbr></li>
        
    </ul>
</body>
</html>
