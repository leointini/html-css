<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagen dinâmica</h1>
    <p>Tente abrir este site em dispositivos diferentes, ou redimensione o navegador</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="imagem flexível">
    </picture>

    <h1>Reproduzindo áudio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5</p>
    <audio>
        <source src="midia/Eyes - Patrick Jordan Patrikios.mp3" type="audio/mpeg">
    </audio>
    
    <p>
        Caso seu navegador não tenha compatibilidade com o áudio, você pode: <br>
            <a href="midia/Eyes - Patrick Jordan Patrikios.mp3" download="midia/Eyes - Patrick Jordan Patrikios.mp3">Baixar</a> <br>
            <a href="midia/Eyes - Patrick Jordan Patrikios.mp3" target="_blank">Abrir em nova aba</a>
    </p>

</body>
</html>
