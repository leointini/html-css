<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e quebras de linha</h1>
    <hr>
    <p>Você pode escrever um parágrafo de qualquer jeito, basta colocar tudo dentro da tag &lt;p> e &lt;p/> </p>
    <p>Se precisar quebrar o texto como esse<br> basta usar a tag &lt;br></p>
    <p>Vamos adicionar símbolos: 
        &reg;
        &copy;
        &trade;
        &euro;
        &yen;
        &real;
        &Delta; <br>
        &uparrow; ou &uarr;
        &downarrow; ou &darr;
    </p>
    <p>Vamos adicionar alguns emojis: &#x1F596; &#x1F913;</p>
</body>
</html>
