<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1 {
            background-color: rgb(226, 226, 226);
            height: 300px;
            width: 300px;

            border: 10px solid crimson;

            padding: 10px;

            outline: 5px dashed black;

            margin: 20px auto 25px auto;
        }

        a {
            border: 4px solid rgb(71, 145, 148);
            padding: 5px 5px 5px 5px;
        }
    </style>
</head>
<body>
    <!--   
    User agent = Navegador
    -->
    <h1>Exemplo de caixa box-level</h1>
    <p>paráfgrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level.</a> Vamos ver como isso funciona.</p>
</body>
</html>
